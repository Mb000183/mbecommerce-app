<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>E-Commerce Omnichannel Management System</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         display:flex;flex-direction:column;align-items:center;justify-content:center;
         min-height:100vh;text-align:center;padding:24px}
    .icon{width:80px;height:80px;background:linear-gradient(135deg,#6366f1,#8b5cf6);
          border-radius:20px;display:flex;align-items:center;justify-content:center;
          font-size:36px;margin-bottom:24px;box-shadow:0 0 40px rgba(99,102,241,.4)}
    h1{font-size:1.4rem;font-weight:700;margin-bottom:8px}
    p{color:#94a3b8;font-size:.875rem;max-width:300px;line-height:1.6}
    .dots{margin-top:24px}
    .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#6366f1;
         margin:0 3px;animation:bounce .8s ease-in-out infinite}
    .dot:nth-child(2){animation-delay:.16s}.dot:nth-child(3){animation-delay:.32s}
    @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-10px)}}
  </style>
</head>
<body>
  <div class="icon">🛒</div>
  <h1>Omnichannel Hub</h1>
  <p>Loading your E-Commerce Command Centre…</p>
  <div class="dots">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
  </div>
  <!-- Placeholder: Appflow replaces this with your real Vite build output -->
</body>
</html>
